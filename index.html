<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Be A Better Self v2.2 | 影像比對系統</title>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <style>
        :root { --p: #8da399; --err: #c0392b; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .box { border: 2px dashed #ccc; aspect-ratio: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 8px; position: relative; overflow: hidden; background: #fafafa; }
        img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .progress-bar { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin: 10px 0; display: none; overflow: hidden; }
        .progress-inner { height: 100%; background: var(--p); width: 0%; transition: width 0.3s; }
        .timer { font-size: 1.2rem; font-weight: bold; color: var(--err); text-align: center; margin: 10px 0; }
        button { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-p { background: var(--p); color: white; }
        .btn-p:disabled { background: #ccc; }
        .info { font-size: 0.85rem; padding: 10px; border-left: 4px solid var(--p); background: #f9f9f9; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>實相比對系統 v2.2</h2>
    
    <div class="timer" id="timer-display">等待任務啟動...</div>
    
    <div class="grid">
        <div class="box" id="box-before">
            <span>Before (起始)</span>
            <img id="img-before">
        </div>
        <div class="box" id="box-after">
            <span>After (成果)</span>
            <img id="img-after">
        </div>
    </div>

    <div class="progress-bar" id="progress-container"><div class="progress-inner" id="progress-fill"></div></div>

    <input type="file" id="file-input" accept="image/*" style="display:none">
    <button class="btn-p" onclick="triggerUpload('before')">1. 上傳/拍攝 Before</button>
    <button class="btn-p" id="btn-after" disabled onclick="triggerUpload('after')">2. 上傳/拍攝 After (需等待)</button>
    <button class="btn-p" id="btn-calc" disabled onclick="compareImages()">3. 執行影像演算法比對</button>

    <div class="info" id="status-msg">請先上傳 Before 照片以開啟任務。</div>
    <canvas id="calc-canvas" style="display:none"></canvas>
</div>

<script>
    let mode = '';
    let beforeData = null;
    let lockMinutes = 1; // 設定強制間隔時間（例如 1 分鐘，方便你測試）
    let startTime = null;

    function triggerUpload(target) {
        mode = target;
        document.getElementById('file-input').click();
    }

    document.getElementById('file-input').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // 模擬上傳進度顯示
        const bar = document.getElementById('progress-container');
        const fill = document.getElementById('progress-fill');
        bar.style.display = 'block';
        fill.style.width = '0%';
        
        let p = 0;
        let iv = setInterval(() => {
            p += 20;
            fill.style.width = p + '%';
            if (p >= 100) {
                clearInterval(iv);
                processFile(file);
            }
        }, 100);
    };

    function processFile(file) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = document.getElementById(`img-${mode}`);
            img.src = event.target.result;
            img.style.display = 'block';
            
            if (mode === 'before') {
                startTime = new Date();
                startTimer();
                document.getElementById('status-msg').innerText = "任務已鎖定，間隔時間開始計算...";
            }
            document.getElementById('progress-container').style.display = 'none';
        };
        reader.readAsDataURL(file);
    }

    function startTimer() {
        const display = document.getElementById('timer-display');
        const btnAfter = document.getElementById('btn-after');
        
        let countdown = lockMinutes * 60;
        const timer = setInterval(() => {
            let m = Math.floor(countdown / 60);
            let s = countdown % 60;
            display.innerText = `冷卻中: ${m}:${s < 10 ? '0'+s : s}`;
            countdown--;

            if (countdown < 0) {
                clearInterval(timer);
                display.innerText = "時間達標，可拍攝 After 證據";
                display.style.color = "green";
                btnAfter.disabled = false;
                document.getElementById('btn-calc').disabled = false;
            }
        }, 1000);
    }

    async function compareImages() {
        const msg = document.getElementById('status-msg');
        msg.innerText = "演算法分析中：[1] 一致性檢查 [2] 像素差異計算...";
        
        // 這裡模擬演算法比對邏輯
        setTimeout(() => {
            const randomDiff = (Math.random() * 30 + 5).toFixed(2); // 模擬像素變動率
            msg.innerHTML = `
                <b>比對結果：</b><br>
                1. 物體一致性：92% (判定為相同場景)<br>
                2. 影像變動率：${randomDiff}%<br>
                3. 驗證結論：<span style="color:green">真實有效的實踐記錄</span>
            `;
        }, 2000);
    }
</script>
</body>
</html>
