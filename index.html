<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Be A Better Self v2.3 | 實相演證系統</title>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <style>
        :root { 
            --p: #8da399; 
            --err: #c0392b; 
            --bg: #f4f7f6; 
            --success: #27ae60;
        }
        body { font-family: "PingFang TC", sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h2 { font-weight: 300; text-align: center; color: #444; margin-top: 0; }
        
        /* 狀態顯示區 */
        .status-box { background: #eee; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .timer { font-size: 1.4rem; font-weight: bold; color: var(--err); font-family: monospace; }
        
        /* 圖片網格 */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .box { border: 2px dashed #ddd; aspect-ratio: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 10px; position: relative; overflow: hidden; background: #fafafa; font-size: 0.8rem; color: #999; }
        .box img { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 2; display: none; }
        
        /* 進度條 */
        .progress-container { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin: 15px 0; display: none; }
        .progress-bar { height: 100%; background: var(--p); width: 0%; transition: width 0.2s; }

        /* 按鈕樣式 */
        button { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.3s; }
        .btn-main { background: var(--p); color: white; }
        .btn-main:disabled { background: #d1d1d1; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1px solid var(--p); color: var(--p); }

        .log { font-size: 0.85rem; line-height: 1.6; color: #555; background: #f9f9f9; padding: 15px; border-radius: 8px; border-left: 4px solid var(--p); }
    </style>
</head>
<body>

<div class="container">
    <h2>實相演證原型 v2.3</h2>
    
    <div class="status-box">
        <div id="status-text">系統就緒，請上傳 Before 證據</div>
        <div class="timer" id="timer-display">00:00</div>
    </div>
    
    <div class="grid">
        <div class="box" id="box-before">
            <span>Before (起始)</span>
            <img id="img-before">
        </div>
        <div class="box" id="box-after">
            <span>After (成果)</span>
            <img id="img-after">
        </div>
    </div>

    <div class="progress-container" id="p-container"><div class="progress-bar" id="p-bar"></div></div>

    <input type="file" id="file-input" accept="image/*" style="display:none">
    <button class="btn-main" id="btn-before" onclick="triggerUpload('before')">拍攝 / 上傳 Before</button>
    <button class="btn-main" id="btn-after" disabled onclick="triggerUpload('after')">拍攝 / 上傳 After</button>
    <button class="btn-outline" id="btn-verify" disabled onclick="runAIAnalysis()">執行影像演算法比對</button>

    <div class="log" id="log-display">
        <b>系統日誌：</b><br>
        等待使用者輸入...
    </div>
</div>

<script>
    let mode = '';
    let lockMinutes = 1; // 為了方便實驗測試，設為 1 分鐘，論文可寫建議 30-60 分鐘
    let startTime = null;

    function triggerUpload(target) {
        mode = target;
        document.getElementById('file-input').click();
    }

    document.getElementById('file-input').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // --- 核心邏輯：強制即時性檢查 ---
        const now = new Date();
        const fileDate = file.lastModifiedDate || new Date(file.lastModified);
        const diffMinutes = Math.abs(now - fileDate) / 1000 / 60;

        if (diffMinutes > 5) {
            alert(`【拒絕受領】\n這張照片/截圖產生於 ${Math.round(diffMinutes)} 分鐘前。\n本系統為確保證據真實性，僅接受 5 分鐘內產生的即時數據。`);
            updateLog(`攔截失敗：檔案過期 (${Math.round(diffMinutes)} min ago)`);
            return;
        }

        simulateUpload(file);
    };

    function simulateUpload(file) {
        const container = document.getElementById('p-container');
        const bar = document.getElementById('p-bar');
        container.style.display = 'block';
        
        let progress = 0;
        const interval = setInterval(() => {
            progress += 10;
            bar.style.width = progress + '%';
            if (progress >= 100) {
                clearInterval(interval);
                displayImage(file);
                container.style.display = 'none';
            }
        }, 100);
    }

    function displayImage(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = document.getElementById(`img-${mode}`);
            img.src = e.target.result;
            img.style.display = 'block';
            
            if (mode === 'before') {
                updateLog("Before 驗證通過：即時性符合。");
                startTask();
            } else {
                updateLog("After 驗證通過：即時性符合。");
                document.getElementById('btn-verify').disabled = false;
            }
        };
        reader.readAsDataURL(file);
    }

    function startTask() {
        startTime = new Date();
        document.getElementById('btn-before').disabled = true;
        document.getElementById('status-text').innerText = "任務進行中...";
        
        let seconds = lockMinutes * 60;
        const timer = setInterval(() => {
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            document.getElementById('timer-display').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
            
            if (seconds <= 0) {
                clearInterval(timer);
                document.getElementById('status-text').innerText = "間隔時間達成，請上傳成果";
                document.getElementById('timer-display').style.color = "var(--success)";
                document.getElementById('btn-after').disabled = false;
            }
            seconds--;
        }, 1000);
    }

    function runAIAnalysis() {
        updateLog("執行演算法：特徵點匹配 (Feature Matching)...");
        const log = document.getElementById('log-display');
        
        setTimeout(() => {
            // 模擬像素差異計算與一致性判定
            const similarity = (Math.random() * 15 + 80).toFixed(2); // 模擬同一場景機率
            const changeRate = (Math.random() * 40 + 10).toFixed(2); // 模擬進步變動率
            
            log.innerHTML = `
                <b style="color:var(--success)">【演算法比對完成】</b><br>
                ● 環境一致性：${similarity}% (判定為同一標的物)<br>
                ● 實體像素變動率：${changeRate}%<br>
                ● 時間間隔檢查：合格<br>
                ● 最終結論：實相驗證成功。
            `;
        }, 2000);
    }

    function updateLog(msg) {
        const log = document.getElementById('log-display');
        log.innerHTML = `<b>系統日誌：</b><br>${msg}`;
    }
</script>

</body>
</html>
