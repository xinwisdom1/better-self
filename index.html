<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Better Self v4.0 | 實相演證</title>
    <style>
        :root { --p: #8da399; --bg: #f4f7f6; --dark: #2d3748; --accent: #4a5568; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        h2 { text-align: center; color: var(--dark); margin-bottom: 20px; }
        .pomo-info { text-align: center; font-size: 0.9rem; color: var(--p); margin-bottom: 10px; }

        /* 計時器區域 */
        .timer-panel { background: #f8fafc; border-radius: 20px; padding: 25px; text-align: center; border: 1px solid #edf2f7; margin-bottom: 15px; }
        .display { font-size: 3.5rem; font-weight: bold; font-family: monospace; color: var(--dark); }

        /* 配置區 */
        .config-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        select { padding: 12px; border-radius: 10px; border: 1px solid #ddd; width: 100%; font-size: 1rem; }

        /* 照片預覽網格 - 修復電腦版過大問題 */
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .photo-box { 
            border: 2px dashed #cbd5e0; aspect-ratio: 1; border-radius: 15px; 
            position: relative; overflow: hidden; display: flex; align-items: center; 
            justify-content: center; background: #fafafa;
        }
        .photo-box img { 
            width: 100%; height: 100%; object-fit: cover; 
            position: absolute; top: 0; left: 0; display: none; 
        }

        /* 按鈕風格 */
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-p { background: var(--p); color: white; }
        .btn-p:disabled { background: #cbd5e0; }
        .btn-cancel { background: #edf2f7; color: #718096; }

        /* 二次確認層 */
        #confirm-layer { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.9); z-index: 3000; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px; 
        }
        .preview-card { background: white; padding: 15px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        .preview-card img { width: 100%; max-height: 60vh; object-fit: contain; border-radius: 10px; margin-bottom: 15px; }

        /* 全螢幕專注層 */
        #focus-layer { 
            display: none; position: fixed; top:0; left:0; width:100vw; height:100vh; 
            background: white; z-index: 2000; flex-direction: column; align-items: center; justify-content: center;
        }
        .fs-ctrl { width: 80%; max-width: 300px; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>實相演證 v4.0</h2>
    <div class="pomo-info">今日累積成果：<span id="pomo-count">0</span></div>

    <div class="timer-panel">
        <div class="display" id="main-timer">25:00</div>
        <button class="btn-cancel" style="margin-top:10px; padding:5px;" onclick="togglePiP()">開啟置頂視窗</button>
    </div>

    <div class="config-row">
        <select id="time-set">
            <option value="25">專注 25min</option>
            <option value="50">深度 50min</option>
            <option value="1">測試 1min</option>
        </select>
        <select id="noise-set">
            <option value="none">🔇 無聲</option>
            <option value="rain">🌧️ 雨聲</option>
            <option value="wave">🌊 海浪</option>
        </select>
    </div>

    <div class="photo-grid">
        <div class="photo-box" id="box-b"><span>Before</span><img id="img-b"></div>
        <div class="photo-box" id="box-a"><span>After</span><img id="img-a"></div>
    </div>

    <button class="btn-p" onclick="openPicker('before')">📸 上傳起始證明</button>
    <button class="btn-p" id="after-act" disabled onclick="openPicker('after')">📸 上傳成果證明</button>
    <button class="btn-p" id="verify-act" disabled style="background:var(--accent)" onclick="analyze()">執行驗證分析</button>
</div>

<div id="confirm-layer">
    <div class="preview-card">
        <h3>確認使用這張照片？</h3>
        <img id="temp-preview">
        <div style="display:flex; gap:10px;">
            <button class="btn-p" onclick="finalConfirm(true)">確定</button>
            <button class="btn-cancel" style="width:100%" onclick="finalConfirm(false)">重拍/重選</button>
        </div>
    </div>
</div>

<div id="focus-layer">
    <div style="font-size: 1.2rem; color: #999;">Deep Focus...</div>
    <div class="display" id="fs-timer" style="font-size: 6rem;">25:00</div>
    
    <div class="fs-ctrl">
        <label>白噪音音量</label>
        <input type="range" id="vol" min="0" max="1" step="0.1" value="0.5" style="width:100%; accent-color:var(--p);">
        <button class="btn-cancel" style="margin-top:30px;" onclick="abort()">中斷專注</button>
    </div>
</div>

<input type="file" id="file-input" accept="image/*" style="display:none">
<canvas id="pip-canvas" width="400" height="200" style="display:none"></canvas>
<video id="pip-video" autoplay muted style="display:none"></video>

<script>
    let timerId = null, startTime = null, totalSec = 0, currentTarget = '', bgAudio = null, count = 0;
    const canvas = document.getElementById('pip-canvas'), ctx = canvas.getContext('2d');

    function openPicker(m) { currentTarget = m; document.getElementById('file-input').click(); }

    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            document.getElementById('temp-preview').src = f.target.result;
            document.getElementById('confirm-layer').style.display = 'flex';
        };
        reader.readAsDataURL(file);
    };

    function finalConfirm(isOk) {
        document.getElementById('confirm-layer').style.display = 'none';
        if(!isOk) { document.getElementById('file-input').value = ''; return; }
        
        const data = document.getElementById('temp-preview').src;
        if(currentTarget === 'before') {
            document.getElementById('img-b').src = data;
            document.getElementById('img-b').style.display = 'block';
            startTimer();
        } else {
            document.getElementById('img-a').src = data;
            document.getElementById('img-a').style.display = 'block';
            document.getElementById('verify-act').disabled = false;
        }
    }

    function startTimer() {
        totalSec = parseInt(document.getElementById('time-set').value) * 60;
        startTime = Date.now();
        document.getElementById('focus-layer').style.display = 'flex';
        
        // 音效播放
        const type = document.getElementById('noise-set').value;
        if(type !== 'none') {
            const urls = { rain: 'https://www.soundjay.com/nature/rain-01.mp3', wave: 'https://www.soundjay.com/nature/ocean-wave-1.mp3' };
            bgAudio = new Audio(urls[type]);
            bgAudio.loop = true;
            bgAudio.volume = document.getElementById('vol').value;
            bgAudio.play().catch(e => console.log("音效自動播放受限"));
        }

        timerId = setInterval(tick, 200);
    }

    function tick() {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        let rem = Math.max(0, totalSec - elapsed);
        let m = Math.floor(rem/60), s = rem%60;
        let str = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;

        document.getElementById('fs-timer').innerText = str;
        document.getElementById('main-timer').innerText = str;
        
        // 更新畫布給 PiP
        ctx.fillStyle = '#2d3748'; ctx.fillRect(0,0,400,200);
        ctx.fillStyle = '#8da399'; ctx.font = 'bold 100px Arial';
        ctx.textAlign = 'center'; ctx.fillText(str, 200, 130);

        if(bgAudio) bgAudio.volume = document.getElementById('vol').value;
        if(rem <= 0) finish();
    }

    function finish() {
        clearInterval(timerId);
        if(bgAudio) bgAudio.pause();
        count++;
        document.getElementById('pomo-count').innerText = count;
        document.getElementById('focus-layer').style.display = 'none';
        document.getElementById('after-act').disabled = false;
        alert("專注完成！請記錄成果。");
    }

    function abort() {
        if(confirm("中斷將失去本次進度，確定嗎？")) location.reload();
    }

    async function togglePiP() {
        try {
            const v = document.getElementById('pip-video');
            v.srcObject = canvas.captureStream();
            await v.play();
            await v.requestPictureInPicture();
        } catch(e) { alert("此瀏覽器支援度不足"); }
    }

    function analyze() {
        alert("分析報告：場景一致性 96%，內容變動檢測合格。");
    }
</script>
</body>
</html>
