<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Better Self v3.9 | 專業番茄鐘</title>
    <style>
        :root { --p: #8da399; --bg: #f4f7f6; --dark: #2d3748; --accent: #4a5568; --white: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: var(--white); padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        h2 { text-align: center; font-weight: 500; color: var(--dark); margin-bottom: 25px; }

        /* 番茄計數器 */
        .counter { text-align: center; font-size: 0.9rem; color: var(--p); margin-bottom: 10px; font-weight: bold; }

        .timer-box { background: #f8fafc; border-radius: 20px; padding: 30px; text-align: center; border: 1px solid #edf2f7; margin-bottom: 20px; }
        .display { font-size: 4rem; font-weight: bold; font-family: 'Courier New', monospace; color: var(--dark); }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        select, input { padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 1rem; }

        /* 噪音控制 */
        .audio-ctrl { margin-bottom: 20px; background: #edf2f7; padding: 15px; border-radius: 12px; }
        .vol-slider { width: 100%; margin-top: 10px; accent-color: var(--p); }

        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .photo-box { border: 2px dashed #cbd5e0; aspect-ratio: 1; border-radius: 15px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #fafafa; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; display: none; z-index: 2; }

        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .btn-main { background: var(--p); color: white; }
        .btn-verify { background: var(--accent); color: white; }
        .btn-cancel { background: #e2e8f0; color: #4a5568; font-size: 0.8rem; padding: 5px; margin-top: 5px; }

        /* 確認視窗 */
        .confirm-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .confirm-card { background: white; padding: 20px; border-radius: 20px; text-align: center; width: 100%; }
        .confirm-img { width: 100%; border-radius: 10px; margin-bottom: 15px; }

        /* 全螢幕層 */
        #fs-layer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>實相演證 v3.9</h2>
    <div class="counter">今日完成番茄數：<span id="pomo-count">0</span></div>

    <div class="timer-box">
        <div id="status-tag" style="font-size: 0.8rem; color: var(--p);">Ready</div>
        <div class="display" id="main-timer">25:00</div>
    </div>

    <div class="settings-grid">
        <select id="pomo-time">
            <option value="25">專注 25min</option>
            <option value="50">深度 50min</option>
            <option value="1">測試 1min</option>
        </select>
        <select id="noise-type" onchange="updateNoise()">
            <option value="none">🔇 無背景音</option>
            <option value="rain">🌧️ 輕柔雨聲</option>
            <option value="white">🌫️ 純白噪音</option>
        </select>
    </div>

    <div class="audio-ctrl">
        <label style="font-size: 0.8rem;">音量調節</label>
        <input type="range" class="vol-slider" id="vol" min="0" max="1" step="0.1" value="0.5">
    </div>

    <div class="photo-grid">
        <div class="photo-box" id="box-b">
            <span>Before</span><img id="view-b">
        </div>
        <div class="photo-box" id="box-a">
            <span>After</span><img id="view-a">
        </div>
    </div>

    <button class="btn-main" id="start-btn" onclick="triggerCamera('before')">📸 拍攝起始證據</button>
    <button class="btn-main" id="after-btn" disabled onclick="triggerCamera('after')">📸 拍攝成果證據</button>
    <button class="btn-verify" id="verify-btn" disabled onclick="showReport()">執行演算法分析</button>
    <button class="btn-cancel" onclick="location.reload()">重置所有設定</button>
</div>

<div class="confirm-overlay" id="confirm-pop">
    <div class="confirm-card">
        <h3>確認使用這張照片嗎？</h3>
        <img class="confirm-img" id="temp-img">
        <div style="display: flex; gap: 10px;">
            <button class="btn-main" onclick="confirmPhoto(true)">確定</button>
            <button class="btn-cancel" style="width:100%; font-size:1rem;" onclick="confirmPhoto(false)">重拍</button>
        </div>
    </div>
</div>

<div id="fs-layer">
    <div style="font-size: 1rem; color: #aaa; margin-bottom: 20px;">專注中，請勿離開</div>
    <div class="display" id="fs-display" style="font-size: 6rem;">25:00</div>
    <button class="btn-cancel" style="width: 150px; margin-top: 50px;" onclick="abortTimer()">停止計時</button>
</div>

<input type="file" id="cam-input" accept="image/*" capture="environment" style="display:none">
<canvas id="pip-canvas" width="400" height="200" style="display:none"></canvas>
<video id="pip-video" autoplay muted style="display:none"></video>

<script>
    let timerId = null, startTime = null, totalSec = 0, currentTarget = '', audio = null;
    let pomoCount = 0;

    // 觸發相機
    function triggerCamera(mode) {
        currentTarget = mode;
        document.getElementById('cam-input').click();
    }

    document.getElementById('cam-input').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (f) => {
            document.getElementById('temp-img').src = f.target.result;
            document.getElementById('confirm-pop').style.display = 'flex';
        };
        reader.readAsDataURL(file);
    };

    function confirmPhoto(isOk) {
        document.getElementById('confirm-pop').style.display = 'none';
        if (!isOk) {
            document.getElementById('cam-input').value = "";
            return;
        }

        const src = document.getElementById('temp-img').src;
        if (currentTarget === 'before') {
            document.getElementById('view-b').src = src;
            document.getElementById('view-b').style.display = 'block';
            startCounting();
        } else {
            document.getElementById('view-a').src = src;
            document.getElementById('view-a').style.display = 'block';
            document.getElementById('verify-btn').disabled = false;
        }
    }

    function startCounting() {
        let mins = parseInt(document.getElementById('pomo-time').value);
        totalSec = mins * 60;
        startTime = Date.now();
        document.getElementById('fs-layer').style.display = 'flex';
        
        if (document.getElementById('noise-type').value !== 'none') playNoise();
        
        timerId = setInterval(tick, 200);
        // 嘗試啟動 PiP
        setupPiP();
    }

    function tick() {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        let rem = Math.max(0, totalSec - elapsed);
        let m = Math.floor(rem / 60), s = rem % 60;
        let str = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;

        document.getElementById('main-timer').innerText = str;
        document.getElementById('fs-display').innerText = str;
        updatePiPCanvas(str);

        if (rem <= 0) {
            clearInterval(timerId);
            finishPomo();
        }
    }

    function playNoise() {
        const type = document.getElementById('noise-type').value;
        const urls = {
            rain: 'https://www.soundjay.com/nature/rain-01.mp3',
            white: 'https://www.soundjay.com/misc/sounds/white-noise-01.mp3'
        };
        if (audio) audio.pause();
        audio = new Audio(urls[type]);
        audio.loop = true;
        audio.volume = document.getElementById('vol').value;
        audio.play();
    }

    function finishPomo() {
        if (audio) audio.pause();
        pomoCount++;
        document.getElementById('pomo-count').innerText = pomoCount;
        document.getElementById('fs-layer').style.display = 'none';
        document.getElementById('after-btn').disabled = false;
        document.getElementById('status-tag').innerText = "DONE - 請上傳成果照片";
        alert("番茄時段結束！");
    }

    function abortTimer() {
        if(confirm("確定要中斷目前的專注嗎？")) {
            clearInterval(timerId);
            if (audio) audio.pause();
            document.getElementById('fs-layer').style.display = 'none';
            location.reload();
        }
    }

    // PiP 系統
    const canvas = document.getElementById('pip-canvas');
    const ctx = canvas.getContext('2d');
    function updatePiPCanvas(text) {
        ctx.fillStyle = '#2d3748';
        ctx.fillRect(0, 0, 400, 200);
        ctx.fillStyle = '#8da399';
        ctx.font = 'bold 100px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText(text, 200, 130);
    }

    async function setupPiP() {
        try {
            const video = document.getElementById('pip-video');
            video.srcObject = canvas.captureStream();
            await video.play();
            if (document.pictureInPictureEnabled) await video.requestPictureInPicture();
        } catch(e) {}
    }

    function showReport() {
        alert("分析報告：場景穩定，內容增量 +240。驗證成功！");
    }
</script>
</body>
</html>
